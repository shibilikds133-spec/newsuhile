name: Supabase Keep Alive

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allows you to manually trigger it from GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load .env and Ping Supabase REST API
        run: |
          source .env
          
          echo "Pinging Supabase to keep project active..."
          
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$VITE_SUPABASE_URL/rest/v1/heartbeat?select=id&limit=1" \
            -H "apikey: $VITE_SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $VITE_SUPABASE_ANON_KEY")
            
          echo "Response Status: $STATUS_CODE"
          
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Ping successful! Supabase project is active."
          else
            echo "Ping failed. Check if URL and Key are correct."
            exit 1
          fi
