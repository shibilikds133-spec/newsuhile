<!DOCTYPE html>
<html>
<head>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
  </style>
</head>
<body class="p-8 bg-white">
  <div id="container" class="space-y-4 bg-white p-4" style="width: 400px;">
    
    <!-- Original -->
    <div id="case-original" class="px-6 py-3 flex items-center justify-center gap-1 bg-gradient-to-b from-teal-50/50 to-teal-100/50 border border-teal-200">
      <span class="text-2xl font-black text-teal-800 opacity-80 mt-1">₹</span>
      <span id="text-original" class="text-3xl font-black text-teal-900 font-mono tracking-tight">
        18,500/-
      </span>
    </div>

    <!-- No Flex -->
    <div id="case-noflex" class="px-6 py-3 bg-gradient-to-b from-teal-50/50 to-teal-100/50 border border-teal-200">
      <span class="text-2xl font-black text-teal-800 opacity-80 mt-1 inline-block">₹</span>
      <span id="text-noflex" class="text-3xl font-black text-teal-900 font-mono tracking-tight inline-block">
        18,500/-
      </span>
    </div>

    <!-- Normal Font -->
    <div id="case-normalfont" class="px-6 py-3 flex items-center justify-center gap-1 bg-gradient-to-b from-teal-50/50 to-teal-100/50 border border-teal-200">
      <span class="text-base text-teal-800 mt-1">₹</span>
      <span id="text-normalfont" class="text-base text-teal-900">
        18,500/-
      </span>
    </div>

  </div>
</body>
</html>
